global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

rule_files:
  - '/etc/prometheus/alert_rules.yml'

scrape_configs:
  - job_name: 'mlops-service'
    static_configs:
      - targets: ['localhost:8000']  # Change to your EC2 IP when deploying
    metrics_path: '/metrics'
    scrape_interval: 15s
